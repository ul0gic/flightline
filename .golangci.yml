version: "2"

run:
  timeout: 5m
  go: "1.26"
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - forcetypeassert
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - nilerr
    - noctx
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    govet:
      enable-all: true
      disable:
        # fieldalignment is a memory micro-optimization that fights readability
        # and churns struct field order; not worth it for this codebase.
        - fieldalignment
        # shadow flags the idiomatic `if err := f(); err != nil` short-var form
        # pervasively; suppressing it would mean inventing err2/err3 names that
        # hurt readability. Off by deliberate choice, not oversight.
        - shadow
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # hugeParam fires at 80 bytes; config structs (e.g., asc.Options) routinely
        # exceed that. Pass-by-value is idiomatic for config; tolerate the size.
        - hugeParam
    revive:
      severity: warning
    gosec:
      excludes:
        - G104  # already covered by errcheck
  exclusions:
    paths:
      - internal/api
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocyclo
          - errcheck
          - unparam
      - path: \.gen\.go$
        linters:
          - errcheck
          - gocritic
          - revive
          - gosec
          - unparam
          - unused
          - staticcheck
          - gocyclo
          - bodyclose
